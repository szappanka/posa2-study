title: POSA2 Study Guide
description: Pattern-Oriented Software Architecture, Volume 2 – tanulási jegyzetek

# Saját layoutot használunk (_layouts/default.html), ezért nincs beépített téma.
# A baseurl a projekt-oldal útvonala — enélkül a CSS és a linkek elhasalnak
# a https://szappanka.github.io/posa2-study/ aloldalon.
baseurl: "/posa2-study"
url: "https://szappanka.github.io"

# Sima Jekyllnél explicit kell a plugin, ami a .md-re mutató linkeket
# (.md kiterjesztés nélkül) feloldja. Élesen a GitHub Pages alapból tudja ezt.
plugins:
  - jekyll-relative-links

# A docs oldal navigációja — kétszintű.
# A felső szint vagy önálló link (url), vagy egy témakör (children-nel),
# amelynek a patternjei eggyel beljebb jelennek meg.
nav:
  - title: Kezdőlap
    url: /
  - title: Service Access & Configuration
    url: /docs/01-service-access-overview
    children:
      - title: Wrapper Facade
        url: /docs/02-wrapper-facade
      - title: Component Configurator
        url: /docs/03-component-configurator
      - title: Interceptor
        url: /docs/04-interceptor
      - title: Extension Interface
        url: /docs/05-extension-interface
  - title: Event Handling
    url: /docs/06-event-handling-overview
    children:
      - title: Reactor
        url: /docs/07-reactor
      - title: Proactor
        url: /docs/08-proactor
      - title: Async Completion Token
        url: /docs/09-async-completion-token
      - title: Acceptor-Connector
        url: /docs/10-acceptor-connector
  - title: Synchronization
    url: /docs/11-synchronization-overview
    children:
      - title: Scoped Locking
        url: /docs/12-scoped-locking
      - title: Strategized Locking
        url: /docs/13-strategized-locking
      - title: Thread-Safe Interface
        url: /docs/14-thread-safe-interface
      - title: Double-Checked Locking
        url: /docs/15-double-checked-locking
  - title: Concurrency
    url: /docs/16-concurrency-overview
    children:
      - title: Active Object
        url: /docs/17-active-object
      - title: Monitor Object
        url: /docs/18-monitor-object
      - title: Half-Sync/Half-Async
        url: /docs/19-half-sync-half-async
      - title: Leader/Followers
        url: /docs/20-leader-followers
      - title: Thread-Specific Storage
        url: /docs/21-thread-specific-storage

# Ezeket ne építse be a Pages a dokumentációs oldalba.
# A quiz-app egy külön Vite/React projekt, saját buildet igényel.
exclude:
  - quiz-app/
  - README.md
